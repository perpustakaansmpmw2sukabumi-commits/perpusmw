    <script>
        // --- Sirkulasi & Layanan Absensi ---
        window.lookupMember = (prefix) => {
            const val = document.getElementById(`${prefix}-member-id`).value.trim();
            const info = document.getElementById(`${prefix}-member-info`);
            if (!val) { info.innerText = ''; return; }
            const m = Utils.sanitizeArray(AppState.members).find(item => item.id.toLowerCase() === val.toLowerCase() || item.nis === val);
            if (m) {
                info.innerText = `${m.name} (${m.class})`; info.className = "mt-1 text-xs text-green-600 font-bold min-h-[16px]";
                document.getElementById(`${prefix}-member-id`).value = m.id;
            } else {
                info.innerText = 'Anggota tidak ditemukan!'; info.className = "mt-1 text-xs text-red-500 font-bold min-h-[16px]";
            }
        };

        window.lookupBook = (prefix) => {
            const val = document.getElementById(`${prefix}-book-id`).value.trim();
            const info = document.getElementById(`${prefix}-book-info`);
            if (!val) { info.innerText = ''; return; }
            const b = Utils.sanitizeArray(AppState.books).find(item => item.id.toLowerCase() === val.toLowerCase() || item.isbn === val);
            if (b) {
                if (b.stock > 0) {
                    info.innerText = `${b.title} (Sisa: ${b.stock})`; info.className = "mt-1 text-xs text-green-600 font-bold min-h-[16px]";
                    document.getElementById(`${prefix}-book-id`).value = b.id;
                } else {
                    info.innerText = `Stok Habis!`; info.className = "mt-1 text-xs text-red-500 font-bold min-h-[16px]";
                }
            } else {
                info.innerText = 'Buku tidak ditemukan!'; info.className = "mt-1 text-xs text-red-500 font-bold min-h-[16px]";
            }
        };

        window.processBorrow = (e) => {
            e.preventDefault();
            const mId = document.getElementById('borrow-member-id').value.trim();
            const bId = document.getElementById('borrow-book-id').value.trim();
            
            const member = Utils.sanitizeArray(AppState.members).find(m => m.id === mId);
            const book = Utils.sanitizeArray(AppState.books).find(b => b.id === bId);

            if (!member || !book) return Swal.fire("Error", "ID Anggota atau ID Buku tidak valid.", "error");
            if (book.stock <= 0) return Swal.fire("Gagal", "Stok buku habis.", "warning");

            const exist = Utils.sanitizeArray(AppState.transactions).find(t => t.memberId === mId && t.bookId === bId && !t.returnDate);
            if (exist) return Swal.fire("Info", "Anggota ini sedang meminjam buku tersebut.", "info");

            const today = new Date();
            const due = new Date(today); due.setDate(due.getDate() + AppState.settings.maxBorrowDays);

            const tx = {
                id: Utils.generateId('TRX'), memberId: member.id, bookId: book.id,
                borrowDate: today.toISOString().split('T')[0], dueDate: due.toISOString().split('T')[0], returnDate: null, fine: 0
            };

            window.showLoading("Memproses sirkulasi...");
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run.withSuccessHandler(function() {
                    google.script.run.withSuccessHandler(function() {
                        AppState.transactions.push(tx); AppState.transactions = Utils.sanitizeArray(AppState.transactions);
                        book.stock--; window.saveLocalCache(); window.hideLoading();
                        Swal.fire("Selesai", `Buku dipinjam. Batas waktu: ${Utils.formatDate(tx.dueDate)}`, "success");
                        document.getElementById('borrow-form').reset();
                        document.getElementById('borrow-member-info').innerText = '';
                        document.getElementById('borrow-book-info').innerText = '';
                        window.renderActiveBorrows();
                    }).saveOrUpdateRow('Transactions', 'id', tx);
                }).saveOrUpdateRow('Books', 'id', book);
            } else {
                AppState.transactions.push(tx); AppState.transactions = Utils.sanitizeArray(AppState.transactions);
                book.stock--; window.saveLocalCache(); window.hideLoading();
                Swal.fire("Lokal Berhasil", `Peminjaman disimpan. Batas: ${Utils.formatDate(tx.dueDate)}`, "success");
                document.getElementById('borrow-form').reset();
                document.getElementById('borrow-member-info').innerText = '';
                document.getElementById('borrow-book-info').innerText = '';
                window.renderActiveBorrows();
            }
        };

        window.renderActiveBorrows = () => {
            const tbody = document.getElementById('active-borrow-table'); if (!tbody) return;
            tbody.innerHTML = '';
            const active = Utils.sanitizeArray(AppState.transactions).filter(t => !t.returnDate);
            if (active.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-gray-400">Tidak ada sirkulasi peminjaman aktif.</td></tr>`; return;
            }
            active.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)).forEach(tx => {
                const member = Utils.sanitizeArray(AppState.members).find(m => m.id === tx.memberId) || { name: 'Siswa Non-aktif' };
                const book = Utils.sanitizeArray(AppState.books).find(b => b.id === tx.bookId) || { title: 'Buku di-arsip' };
                const isLate = new Date() > new Date(tx.dueDate);
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-2"><b>${member.name}</b><br><span class="text-[10px] text-gray-400">${tx.memberId}</span></td>
                        <td class="p-2"><b>${book.title}</b><br><span class="text-[10px] text-gray-400">${tx.bookId}</span></td>
                        <td class="p-2">${Utils.formatDate(tx.borrowDate)}</td>
                        <td class="p-2 ${isLate ? 'text-red-600 font-bold' : ''}">${Utils.formatDate(tx.dueDate)}</td>
                        <td class="p-2">${isLate ? '<span class="text-red-500 font-bold">Terlambat</span>' : '<span class="text-green-600 font-semibold">Aktif</span>'}</td>
                    </tr>
                `;
            });
        };

        window.lookupReturnInfo = () => {
            const val = document.getElementById('return-book-id').value.trim();
            const panel = document.getElementById('return-info-panel');
            const btn = document.getElementById('btn-process-return');
            if (!val) { panel.classList.add('hidden'); btn.disabled = true; return; }

            const book = Utils.sanitizeArray(AppState.books).find(b => b.id.toLowerCase() === val.toLowerCase() || b.isbn === val);
            if (!book) { panel.classList.add('hidden'); btn.disabled = true; return; }

            const tx = Utils.sanitizeArray(AppState.transactions).find(t => t.bookId === book.id && !t.returnDate);
            if (tx) {
                window.currentReturnTx = tx;
                const member = Utils.sanitizeArray(AppState.members).find(m => m.id === tx.memberId) || { name: 'Non-aktif', class:'-' };
                document.getElementById('return-book-id').value = book.id;
                document.getElementById('ret-member-name').innerText = `${member.name} (${member.class})`;
                const fine = Utils.calculateFine(tx.dueDate);
                if (fine > 0) {
                    document.getElementById('ret-days-late').innerText = `Terlambat`;
                    document.getElementById('ret-days-late').className = "font-bold text-red-600";
                    document.getElementById('ret-fine-amount').innerText = Utils.formatCurrency(fine);
                } else {
                    document.getElementById('ret-days-late').innerText = `Tepat Waktu`;
                    document.getElementById('ret-days-late').className = "font-bold text-green-600";
                    document.getElementById('ret-fine-amount').innerText = "Rp 0";
                }
                panel.classList.remove('hidden'); btn.disabled = false;
            } else {
                panel.classList.add('hidden'); btn.disabled = true;
            }
        };

        window.processReturn = (e) => {
            e.preventDefault(); if (!window.currentReturnTx) return;
            const fine = Utils.calculateFine(window.currentReturnTx.dueDate);
            if (fine > 0) {
                Swal.fire({
                    title: 'Denda Keterlambatan',
                    text: `Denda keterlambatan sebesar ${Utils.formatCurrency(fine)}. Lanjutkan pengembalian?`,
                    icon: 'warning', showCancelButton: true, confirmButtonText: 'Terima & Kembalikan'
                }).then((r) => { if (r.isConfirmed) window.finalizeReturn(window.currentReturnTx, fine); });
            } else {
                window.finalizeReturn(window.currentReturnTx, 0);
            }
        };

        window.finalizeReturn = (tx, fineAmount) => {
            window.showLoading("Mengembalikan...");
            tx.returnDate = new Date().toISOString().split('T')[0]; tx.fine = fineAmount;
            const b = Utils.sanitizeArray(AppState.books).find(book => book.id === tx.bookId);
            if (b) b.stock++;

            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run.withSuccessHandler(function() {
                    google.script.run.withSuccessHandler(function() {
                        window.currentReturnTx = null; window.saveLocalCache(); window.hideLoading();
                        document.getElementById('return-form').reset();
                        document.getElementById('return-info-panel').classList.add('hidden');
                        document.getElementById('btn-process-return').disabled = true;
                        Swal.fire("Kembali", "Buku berhasil dipulangkan.", "success");
                        window.renderRecentReturns();
                    }).saveOrUpdateRow('Transactions', 'id', tx);
                }).saveOrUpdateRow('Books', 'id', b);
            } else {
                window.currentReturnTx = null; window.saveLocalCache(); window.hideLoading();
                document.getElementById('return-form').reset();
                document.getElementById('return-info-panel').classList.add('hidden');
                document.getElementById('btn-process-return').disabled = true;
                Swal.fire("Kembali", "Buku dipulangkan lokal.", "success");
                window.renderRecentReturns();
            }
        };

        window.renderRecentReturns = () => {
            const tbody = document.getElementById('recent-return-table'); if (!tbody) return;
            tbody.innerHTML = '';
            const list = Utils.sanitizeArray(AppState.transactions).filter(t => t.returnDate).sort((a,b) => new Date(b.returnDate) - new Date(a.returnDate)).slice(0, 5);
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-gray-400">Belum ada riwayat pengembalian terbaru.</td></tr>`; return;
            }
            list.forEach(tx => {
                const member = Utils.sanitizeArray(AppState.members).find(m => m.id === tx.memberId) || { name: 'Non-aktif' };
                const book = Utils.sanitizeArray(AppState.books).find(b => b.id === tx.bookId) || { title: 'Buku di-arsip' };
                tbody.innerHTML += `
                    <tr class="border-b text-xs hover:bg-gray-50">
                        <td class="p-2"><b>${member.name}</b></td>
                        <td class="p-2 font-semibold text-gray-700">${book.title}</td>
                        <td class="p-2">${Utils.formatDate(tx.returnDate)}</td>
                        <td class="p-2 ${tx.fine > 0 ? 'text-red-500 font-bold' : ''}">${tx.fine > 0 ? Utils.formatCurrency(tx.fine) : 'Lunas'}</td>
                    </tr>
                `;
            });
        };

        window.processVisit = (e) => {
            e.preventDefault();
            const input = document.getElementById('visit-member-id').value.trim();
            const m = Utils.sanitizeArray(AppState.members).find(member => member.id.toLowerCase() === input.toLowerCase() || member.nis === input);
            if (m) {
                const now = new Date();
                const visit = { id: Utils.generateId('V'), memberId: m.id, date: now.toISOString().split('T')[0], time: now.toTimeString().split(' ')[0].substring(0, 5) };
                window.showLoading("Mencatat...");
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run.withSuccessHandler(function() {
                        AppState.visits.push(visit); AppState.visits = Utils.sanitizeArray(AppState.visits);
                        window.saveLocalCache(); window.hideLoading();
                        const msg = document.getElementById('visit-success-msg');
                        document.getElementById('visit-name').innerText = m.name;
                        msg.classList.remove('hidden');
                        document.getElementById('visit-form').reset(); document.getElementById('visit-member-id').focus();
                        setTimeout(() => msg.classList.add('hidden'), 2500);
                        window.renderVisits();
                    }).saveOrUpdateRow('Visits', 'id', visit);
                } else {
                    AppState.visits.push(visit); AppState.visits = Utils.sanitizeArray(AppState.visits);
                    window.saveLocalCache(); window.hideLoading();
                    const msg = document.getElementById('visit-success-msg');
                    document.getElementById('visit-name').innerText = m.name;
                    msg.classList.remove('hidden');
                    document.getElementById('visit-form').reset(); document.getElementById('visit-member-id').focus();
                    setTimeout(() => msg.classList.add('hidden'), 2500);
                    window.renderVisits();
                }
            } else {
                Swal.fire({ title: "Batal Mencatat", text: "NIS atau ID tidak terdaftar.", icon: "error", toast: true, position: "top-end", showConfirmButton: false, timer: 2000 });
                document.getElementById('visit-form').reset();
            }
        };

        window.renderVisits = () => {
            const tbody = document.getElementById('visit-table'); if (!tbody) return;
            tbody.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];
            const list = Utils.sanitizeArray(AppState.visits).filter(v => v.date === today).sort((a,b) => b.time.localeCompare(a.time));
            document.getElementById('visit-count').innerText = list.length;
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-gray-400">Belum ada pengunjung hari ini.</td></tr>`; return;
            }
            list.forEach(v => {
                const member = Utils.sanitizeArray(AppState.members).find(m => m.id === v.memberId) || { nis: '-', name: 'Non-aktif', class: '-' };
                tbody.innerHTML += `
                    <tr class="border-b text-xs">
                        <td class="p-2 font-mono text-gray-400">${v.time}</td>
                        <td class="p-2">${member.nis}</td>
                        <td class="p-2 font-bold">${member.name}</td>
                        <td class="p-2">${member.class}</td>
                    </tr>
                `;
            });
        };

        // --- OPAC Grid Dinamis & Peminjaman Mandiri SLiMS Style ---
        window.renderOpacGrid = () => {
            const grid = document.getElementById('opac-grid-body'); if (!grid) return;
            const q = (document.getElementById('opac-public-search')?.value || '').toLowerCase();
            grid.innerHTML = '';
            const filtered = Utils.sanitizeArray(AppState.books).filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center text-xs text-gray-500 py-10">Koleksi tidak ditemukan.</div>`; return;
            }

            filtered.forEach(b => {
                const isAvailable = b.stock > 0;
                const card = document.createElement('div'); card.className = "bg-white border rounded-lg p-3 text-xs shadow-sm flex flex-col justify-between";
                card.innerHTML = `
                    <div class="text-center">
                        <img src="${b.coverUrl || 'https://placehold.co/100x120'}" class="w-20 h-28 object-cover rounded mx-auto mb-2 border shadow-sm" onerror="this.src='https://placehold.co/100x120'">
                        <h4 class="font-bold text-gray-800 line-clamp-2 min-h-[32px]">${b.title}</h4>
                        <p class="text-[10px] text-gray-400 mt-1 truncate">Oleh: ${b.author}</p>
                        <span class="inline-block mt-2 font-bold px-2 py-0.5 rounded-full text-[10px] ${isAvailable ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${isAvailable ? 'Tersedia: '+b.stock : 'Habis'}</span>
                    </div>
                    <button onclick="window.selfBorrowBook('${b.id}')" class="w-full mt-3 py-1 bg-green-600 hover:bg-green-700 text-white font-bold rounded text-[10px] flex items-center justify-center gap-1 ${isAvailable ? '' : 'opacity-50 cursor-not-allowed'}" ${isAvailable ? '' : 'disabled'}><i class="fas fa-hand-holding"></i>Pinjam Mandiri</button>
                `;
                grid.appendChild(card);
            });
        };

        window.selfBorrowBook = async (bookId) => {
            const b = Utils.sanitizeArray(AppState.books).find(item => item.id === bookId); if (!b) return;
            const { value: memberInput } = await Swal.fire({
                title: 'Peminjaman Mandiri',
                text: `Scan barcode kartu anggota atau ketik NIS Anda untuk meminjam "${b.title}":`,
                input: 'text', inputPlaceholder: 'ID Anggota / NIS...', showCancelButton: true
            });
            if (memberInput) {
                const member = Utils.sanitizeArray(AppState.members).find(m => m.id.toLowerCase() === memberInput.toLowerCase() || m.nis === memberInput);
                if (!member) return Swal.fire("Gagal", "ID Anggota / NIS tidak valid.", "error");

                const exist = Utils.sanitizeArray(AppState.transactions).find(t => t.memberId === member.id && t.bookId === b.id && !t.returnDate);
                if (exist) return Swal.fire("Batal", "Anda sedang meminjam satu eksemplar buku ini.", "warning");

                const today = new Date();
                const due = new Date(today); due.setDate(due.getDate() + AppState.settings.maxBorrowDays);

                const tx = { id: Utils.generateId('TRX'), memberId: member.id, bookId: b.id, borrowDate: today.toISOString().split('T')[0], dueDate: due.toISOString().split('T')[0], returnDate: null, fine: 0 };
                const visit = { id: Utils.generateId('V'), memberId: member.id, date: today.toISOString().split('T')[0], time: today.toTimeString().split(' ')[0].substring(0, 5) };

                window.showLoading("Menyimpan...");
                AppState.transactions.push(tx); AppState.transactions = Utils.sanitizeArray(AppState.transactions);
                AppState.visits.push(visit); AppState.visits = Utils.sanitizeArray(AppState.visits);
                b.stock--; window.saveLocalCache();

                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run.withSuccessHandler(function() {
                        google.script.run.withSuccessHandler(function() {
                            google.script.run.withSuccessHandler(function() {
                                window.hideLoading();
                                Swal.fire("Selesai", `Pinjam mandiri sukses. Batas: ${Utils.formatDate(tx.dueDate)}. Kehadiran diisi otomatis!`, "success");
                                window.renderOpacGrid();
                            }).saveOrUpdateRow('Books', 'id', b);
                        }).saveOrUpdateRow('Visits', 'id', visit);
                    }).saveOrUpdateRow('Transactions', 'id', tx);
                } else {
                    window.hideLoading();
                    Swal.fire("Lokal Selesai", `Buku sukses dipinjam mandiri lokal. Kehadiran diisi otomatis!`, "success");
                    window.renderOpacGrid();
                }
            }
        };
    </script>

    <script>
        // --- Form Laporan Kustom ---
        window.onReportTypeChange = () => {
            const rType = document.getElementById('report-type').value;
            const rPeriod = document.getElementById('report-period');
            if (rType === 'anggota') { rPeriod.value = 'all'; rPeriod.disabled = true; } else { rPeriod.disabled = false; }
            window.onReportPeriodChange();
        };

        window.onReportPeriodChange = () => {
            const rPeriod = document.getElementById('report-period').value;
            const wrapper = document.getElementById('filter-dynamic-inputs');
            ['filter-daily-wrapper', 'filter-monthly-wrapper', 'filter-yearly-wrapper', 'filter-custom-wrapper'].forEach(id => {
                const el = document.getElementById(id); if (el) el.classList.add('hidden');
            });
            if (rPeriod === 'all') { wrapper.classList.add('hidden'); return; }
            wrapper.classList.remove('hidden');
            if (rPeriod === 'daily') document.getElementById('filter-daily-wrapper').classList.remove('hidden');
            else if (rPeriod === 'monthly') document.getElementById('filter-monthly-wrapper').classList.remove('hidden');
            else if (rPeriod === 'yearly') document.getElementById('filter-yearly-wrapper').classList.remove('hidden');
            else if (rPeriod === 'custom') {
                document.getElementById('filter-custom-wrapper').classList.remove('hidden');
                document.getElementById('filter-date-start').value = new Date(new Date().setDate(1)).toISOString().split('T')[0];
                document.getElementById('filter-date-end').value = new Date().toISOString().split('T')[0];
            }
        };

        window.generateCustomReport = () => {
            const type = document.getElementById('report-type').value;
            const period = document.getElementById('report-period').value;
            let books = Utils.sanitizeArray(AppState.books);
            let members = Utils.sanitizeArray(AppState.members);
            let txs = Utils.sanitizeArray(AppState.transactions);
            let visits = Utils.sanitizeArray(AppState.visits);
            let label = "Semua Periode";

            if (period !== 'all' && type !== 'anggota') {
                const daily = document.getElementById('filter-date-daily').value;
                const mMonth = parseInt(document.getElementById('filter-date-month').value);
                const mYear = parseInt(document.getElementById('filter-date-year-m').value);
                const yYear = parseInt(document.getElementById('filter-date-year').value);
                const start = document.getElementById('filter-date-start').value;
                const end = document.getElementById('filter-date-end').value;

                const isMatch = (dateStr) => {
                    if (!dateStr) return false; const d = new Date(dateStr);
                    if (period === 'daily') { label = `Tanggal: ${Utils.formatDate(daily)}`; return dateStr === daily; }
                    if (period === 'monthly') { label = `Bulan: ${mMonth+1}/${mYear}`; return d.getMonth() === mMonth && d.getFullYear() === mYear; }
                    if (period === 'yearly') { label = `Tahun: ${yYear}`; return d.getFullYear() === yYear; }
                    if (period === 'custom') { label = `Rentang: ${Utils.formatDate(start)} - ${Utils.formatDate(end)}`; return dateStr >= start && dateStr <= end; }
                    return true;
                };

                if (type === 'buku') books = books.filter(b => isMatch(b.inputDate));
                else if (type === 'peminjaman') txs = txs.filter(t => !t.returnDate && isMatch(t.borrowDate));
                else if (type === 'pengembalian') txs = txs.filter(t => t.returnDate && isMatch(t.returnDate));
                else if (type === 'kunjungan') visits = visits.filter(v => isMatch(v.date));
            }
            window.executeCetakLaporan(type, books, members, txs, visits, label);
        };

        window.executeCetakLaporan = (type, books, members, txs, visits, label) => {
            const area = document.getElementById('print-area'); if (!area) return;
            area.classList.remove('hidden');
            const todayStr = new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            
            let html = `
                <div style="font-family:sans-serif; padding:20px; -webkit-print-color-adjust:exact; print-color-adjust:exact;">
                    <div style="text-align:center; border-bottom:3px double #333; padding-bottom:8px; margin-bottom:15px;">
                        <h2 style="margin:0; text-transform:uppercase; color:#16a34a; font-size:16px;">LAPORAN ADMINISTRASI PERPUSTAKAAN</h2>
                        <h3 style="margin:4px 0; color:#1e293b; font-size:18px;">${AppState.settings.libraryName}</h3>
                        <p style="margin:0; font-size:11px; color:#4b5563;">${AppState.settings.schoolName}</p>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:15px; border-bottom:1px dashed #cbd5e1; padding-bottom:5px;">
                        <span>Kategori: Laporan ${type.toUpperCase()} (${label})</span><span>Cetak: ${todayStr}</span>
                    </div>
            `;

            if (type === 'buku') {
                html += `
                    <div style="border:1px solid #cbd5e1; border-radius:6px; padding:8px; text-align:center; background:#f8fafc; margin-bottom:15px; font-size:11px;">
                        <b>Total Judul Buku Diinput: ${books.length} | Saldo Copy: ${books.reduce((a,c) => a + (c ? c.stock : 0), 0)} Eksemplar</b>
                    </div>
                    <table style="width:100%; border-collapse:collapse; font-size:10px; text-align:left;">
                        <thead><tr style="background:#f1f5f9;"><th style="border:1px solid #cbd5e1; padding:6px;">Tgl Input</th><th style="border:1px solid #cbd5e1; padding:6px;">ID</th><th style="border:1px solid #cbd5e1; padding:6px;">Judul Buku</th><th style="border:1px solid #cbd5e1; padding:6px;">Pengarang</th><th style="border:1px solid #cbd5e1; padding:6px; text-align:center;">Stok</th></tr></thead>
                        <tbody>${books.map(b => `<tr><td style="border:1px solid #cbd5e1; padding:6px;">${b.inputDate}</td><td style="border:1px solid #cbd5e1; padding:6px;">${b.id}</td><td style="border:1px solid #cbd5e1; padding:6px;"><b>${b.title}</b></td><td style="border:1px solid #cbd5e1; padding:6px;">${b.author}</td><td style="border:1px solid #cbd5e1; padding:6px; text-align:center;">${b.stock}</td></tr>`).join('')}</tbody>
                    </table>
                `;
            } else if (type === 'anggota') {
                html += `
                    <div style="border:1px solid #cbd5e1; border-radius:6px; padding:8px; text-align:center; background:#f8fafc; margin-bottom:15px; font-size:11px;"><b>Total Anggota Aktif Terdaftar: ${members.length} Orang</b></div>
                    <table style="width:100%; border-collapse:collapse; font-size:10px; text-align:left;">
                        <thead><tr style="background:#f1f5f9;"><th style="border:1px solid #cbd5e1; padding:6px;">ID Anggota</th><th style="border:1px solid #cbd5e1; padding:6px;">NIS/NIK</th><th style="border:1px solid #cbd5e1; padding:6px;">Nama Anggota</th><th style="border:1px solid #cbd5e1; padding:6px;">Kelas</th><th style="border:1px solid #cbd5e1; padding:6px;">Kontak WA</th></tr></thead>
                        <tbody>${members.map(m => `<tr><td style="border:1px solid #cbd5e1; padding:6px;">${m.id}</td><td style="border:1px solid #cbd5e1; padding:6px;">${m.nis}</td><td style="border:1px solid #cbd5e1; padding:6px;"><b>${m.name}</b></td><td style="border:1px solid #cbd5e1; padding:6px;">${m.class}</td><td style="border:1px solid #cbd5e1; padding:6px;">${m.phone || '-'}</td></tr>`).join('')}</tbody>
                    </table>
                `;
            } else if (type === 'peminjaman') {
                html += `
                    <table style="width:100%; border-collapse:collapse; font-size:10px; text-align:left;">
                        <thead><tr style="background:#f1f5f9;"><th style="border:1px solid #cbd5e1; padding:6px;">ID</th><th style="border:1px solid #cbd5e1; padding:6px;">Peminjam</th><th style="border:1px solid #cbd5e1; padding:6px;">Judul Buku</th><th style="border:1px solid #cbd5e1; padding:6px; text-align:center;">Pinjam</th><th style="border:1px solid #cbd5e1; padding:6px; text-align:center;">Batas</th></tr></thead>
                        <tbody>${txs.map(t => {
                            const m = Utils.sanitizeArray(AppState.members).find(item => item.id === t.memberId) || {name:'Non-aktif', class:'-'};
                            const b = Utils.sanitizeArray(AppState.books).find(item => item.id === t.bookId) || {title:'Katalog Dihapus'};
                            return `<tr><td style="border:1px solid #cbd5e1; padding:6px;">${t.id}</td><td style="border:1px solid #cbd5e1; padding:6px;">${m.name} (${m.class})</td><td style="border:1px solid #cbd5e1; padding:6px;">${b.title}</td><td style="border:1px solid #cbd5e1; padding:6px; text-align:center;">${t.borrowDate}</td><td style="border:1px solid #cbd5e1; padding:6px; text-align:center;">${t.dueDate}</td></tr>`;
                        }).join('')}</tbody>
                    </table>
                `;
            } else if (type === 'pengembalian') {
                html += `
                    <div style="border:1px solid #cbd5e1; border-radius:6px; padding:8px; text-align:center; background:#f8fafc; margin-bottom:15px; font-size:11px;"><b>Total Denda Kas Terbuku: ${Utils.formatCurrency(txs.reduce((a,c) => a + (c ? c.fine : 0), 0))}</b></div>
                    <table style="width:100%; border-collapse:collapse; font-size:10px; text-align:left;">
                        <thead><tr style="background:#f1f5f9;"><th style="border:1px solid #cbd5e1; padding:6px;">ID</th><th style="border:1px solid #cbd5e1; padding:6px;">Peminjam</th><th style="border:1px solid #cbd5e1; padding:6px;">Judul Buku</th><th style="border:1px solid #cbd5e1; padding:6px; text-align:center;">Kembali</th><th style="border:1px solid #cbd5e1; padding:6px; text-align:right;">Denda</th></tr></thead>
                        <tbody>${txs.map(t => {
                            const m = Utils.sanitizeArray(AppState.members).find(item => item.id === t.memberId) || {name:'Non-aktif', class:'-'};
                            const b = Utils.sanitizeArray(AppState.books).find(item => item.id === t.bookId) || {title:'Katalog Dihapus'};
                            return `<tr><td style="border:1px solid #cbd5e1; padding:6px;">${t.id}</td><td style="border:1px solid #cbd5e1; padding:6px;">${m.name} (${m.class})</td><td style="border:1px solid #cbd5e1; padding:6px;">${b.title}</td><td style="border:1px solid #cbd5e1; padding:6px; text-align:center;">${t.returnDate}</td><td style="border:1px solid #cbd5e1; padding:6px; text-align:right; font-weight:bold;">${t.fine > 0 ? Utils.formatCurrency(t.fine) : 'Lunas'}</td></tr>`;
                        }).join('')}</tbody>
                    </table>
                `;
            } else if (type === 'kunjungan') {
                html += `
                    <table style="width:100%; border-collapse:collapse; font-size:10px; text-align:left;">
                        <thead><tr style="background:#f1f5f9;"><th style="border:1px solid #cbd5e1; padding:6px;">Tanggal</th><th style="border:1px solid #cbd5e1; padding:6px; text-align:center;">Jam</th><th style="border:1px solid #cbd5e1; padding:6px;">NIS</th><th style="border:1px solid #cbd5e1; padding:6px;">Nama Lengkap</th><th style="border:1px solid #cbd5e1; padding:6px;">Kelas</th></tr></thead>
                        <tbody>${visits.map(v => {
                            const m = Utils.sanitizeArray(AppState.members).find(item => item.id === v.memberId) || {nis:'-', name:'Tamu Luar', class:'-'};
                            return `<tr><td style="border:1px solid #cbd5e1; padding:6px;">${v.date}</td><td style="border:1px solid #cbd5e1; padding:6px; text-align:center;">${v.time}</td><td style="border:1px solid #cbd5e1; padding:6px;">${m.nis}</td><td style="border:1px solid #cbd5e1; padding:6px;"><b>${m.name}</b></td><td style="border:1px solid #cbd5e1; padding:6px;">${m.class}</td></tr>`;
                        }).join('')}</tbody>
                    </table>
                `;
            }

            html += `
                <div style="margin-top:40px; display:flex; justify-content:flex-end; font-size:11px;">
                    <div style="text-align:center; width:200px;">
                        <p style="margin:0 0 50px 0;">Kepala Perpustakaan,</p>
                        <p style="margin:0; font-weight:bold; text-decoration:underline;">_________________________</p>
                        <p style="margin:2px 0 0 0; color:#4b5563;">NIP. ..................................</p>
                    </div>
                </div>
            </div>`;
            area.innerHTML = html;
            setTimeout(() => { window.print(); area.classList.add('hidden'); }, 500);
        };
    </script>

    <script>
        // --- Navigasi Sederhana & Handler Autentikasi ---
        const titles = {
            'dashboard': 'Dashboard Utama', 'opac': 'OPAC Digital Mandiri', 'peminjaman': 'Sirkulasi Peminjaman',
            'pengembalian': 'Sirkulasi Pengembalian', 'buku': 'Katalog Buku', 'anggota': 'Data Anggota',
            'kelas': 'Manajemen Kelas', 'kunjungan': 'Buku Kunjungan', 'laporan': 'Cetak Laporan', 'pengaturan': 'Pengaturan Sistem'
        };

        window.navigate = (viewName) => {
            const content = document.getElementById('content-area');
            const title = document.getElementById('page-title');
            if (!content || !title) return;
            title.innerText = titles[viewName]; content.innerHTML = Views[viewName]();

            if (viewName === 'buku') window.renderBookTable();
            else if (viewName === 'opac') window.renderOpacGrid();
            else if (viewName === 'anggota') window.renderMemberTable();
            else if (viewName === 'kelas') window.renderKelas();
            else if (viewName === 'peminjaman') window.renderActiveBorrows();
            else if (viewName === 'pengembalian') window.renderRecentReturns();
            else if (viewName === 'kunjungan') window.renderVisits();
            else if (viewName === 'laporan') window.onReportTypeChange();

            document.querySelectorAll('.sidebar-item').forEach(el => {
                const isActive = el.dataset.target === viewName;
                el.classList.toggle('active', isActive);
            });
            if (window.innerWidth < 768) {
                const s = document.getElementById('sidebar'); if (s) s.classList.add('-translate-x-full');
            }
        };

        window.toggleSidebar = () => {
            const s = document.getElementById('sidebar'); if (!s) return;
            s.classList.toggle('-translate-x-full');
        };

        window.handleLogin = (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if (u === 'admin' && p === 'admin') {
                AppState.isLoggedIn = true;
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                window.updateBrandLabels(); window.navigate('dashboard');
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Login Berhasil', showConfirmButton: false, timer: 1500 });
            } else {
                Swal.fire("Akses Ditolak", "Kredensial login admin keliru.", "error");
            }
        };

        window.handleLogout = () => {
            Swal.fire({ title: 'Keluar?', text: 'Sesi administrasi dihentikan.', icon: 'question', showCancelButton: true }).then((r) => {
                if (r.isConfirmed) {
                    AppState.isLoggedIn = false;
                    document.getElementById('app-view').classList.add('hidden');
                    document.getElementById('login-view').classList.remove('hidden');
                    document.getElementById('login-form').reset();
                }
            });
        };

        setInterval(() => {
            const el = document.getElementById('current-datetime'); if (el) {
                el.innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' WIB';
            }
        }, 1000);

        if (window.innerWidth < 768) {
            const s = document.getElementById('sidebar'); if (s) s.classList.add('-translate-x-full');
        }
    </script>
</body>
</html>
