<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Perpustakaan Premium</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- JsBarcode untuk Barcode -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <!-- SweetAlert2 untuk Notifikasi Pop-Up -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .sidebar-item { transition: all 0.2s ease-in-out; }
        .sidebar-item:hover, .sidebar-item.active { background-color: #f0fdf4; color: #16a34a; border-right: 4px solid #16a34a; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; background: white; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex overflow-hidden">

    <!-- OVERLAY LOADING DATABASE -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-950 bg-opacity-75 z-[9999] flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-green-500 mb-4"></div>
        <p id="loading-text" class="text-white text-lg font-semibold text-center px-4">Menghubungkan ke Google Sheet database...</p>
        <button id="bypass-loading-btn" class="hidden mt-6 bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-2 px-4 rounded-lg shadow-md transition duration-200" onclick="window.bypassLoading()">
            <i class="fas fa-plug-circle-exclamation mr-1"></i> Gunakan Mode Offline (Bypass)
        </button>
    </div>

    <!-- TAMPILAN LOGIN -->
    <div id="login-view" class="fixed inset-0 z-50 bg-gradient-to-br from-green-600 to-teal-700 flex items-center justify-center">
        <div class="glass-panel p-8 rounded-2xl shadow-2xl w-96 max-w-full m-4">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-book-reader text-3xl text-green-600"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800" id="login-lib-name">Perpustakaan</h1>
                <p class="text-xs text-gray-500" id="login-school-name">Sistem Manajemen Admin</p>
            </div>
            <form id="login-form" onsubmit="window.handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 text-xs font-semibold mb-2">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center"><i class="fas fa-user text-gray-400"></i></span>
                        <input class="w-full pl-10 pr-3 py-2 rounded-lg border border-gray-300 text-sm focus:ring-1 focus:ring-green-500 focus:outline-none" type="text" id="username" value="admin" required>
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-xs font-semibold mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center"><i class="fas fa-lock text-gray-400"></i></span>
                        <input class="w-full pl-10 pr-3 py-2 rounded-lg border border-gray-300 text-sm focus:ring-1 focus:ring-green-500 focus:outline-none" type="password" id="password" value="admin" required>
                    </div>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg transition duration-200">Masuk ke Sistem</button>
            </form>
        </div>
    </div>

    <!-- TAMPILAN UTAMA APLIKASI -->
    <div id="app-view" class="hidden w-full h-full flex flex-col md:flex-row">
        <!-- SIDEBAR MENU -->
        <aside class="bg-white w-full md:w-64 border-r border-gray-200 flex flex-col shadow-sm z-10 flex-shrink-0" id="sidebar">
            <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                <div>
                    <h2 class="text-base font-bold text-green-700 truncate" id="sidebar-lib-name">Perpustakaan</h2>
                    <p class="text-[10px] text-gray-500 truncate" id="sidebar-school-name">Admin Panel</p>
                </div>
                <button class="md:hidden text-gray-500" onclick="window.toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
            <div class="overflow-y-auto flex-1 py-2">
                <nav class="space-y-0.5">
                    <a href="#" onclick="window.navigate('dashboard')" class="sidebar-item active flex items-center px-4 py-2.5 text-xs font-semibold text-gray-700" data-target="dashboard">
                        <i class="fas fa-chart-line w-5 text-center mr-2 text-green-500"></i> Dashboard
                    </a>
                    <a href="#" onclick="window.navigate('opac')" class="sidebar-item flex items-center px-4 py-2.5 text-xs font-semibold text-gray-700" data-target="opac">
                        <i class="fas fa-search-plus w-5 text-center mr-2 text-green-500"></i> OPAC Digital
                    </a>
                    <div class="px-4 py-1 text-[10px] font-bold text-gray-400 uppercase">Sirkulasi</div>
                    <a href="#" onclick="window.navigate('peminjaman')" class="sidebar-item flex items-center px-4 py-2 text-xs font-semibold text-gray-700" data-target="peminjaman"><i class="fas fa-hand-holding w-5 text-center mr-2 text-green-500"></i> Peminjaman</a>
                    <a href="#" onclick="window.navigate('pengembalian')" class="sidebar-item flex items-center px-4 py-2 text-xs font-semibold text-gray-700" data-target="pengembalian"><i class="fas fa-undo w-5 text-center mr-2 text-green-500"></i> Pengembalian</a>
                    <div class="px-4 py-1 text-[10px] font-bold text-gray-400 uppercase">Data Master</div>
                    <a href="#" onclick="window.navigate('buku')" class="sidebar-item flex items-center px-4 py-2 text-xs font-semibold text-gray-700" data-target="buku"><i class="fas fa-book w-5 text-center mr-2 text-green-500"></i> Katalog Buku</a>
                    <a href="#" onclick="window.navigate('anggota')" class="sidebar-item flex items-center px-4 py-2 text-xs font-semibold text-gray-700" data-target="anggota"><i class="fas fa-users w-5 text-center mr-2 text-green-500"></i> Data Anggota</a>
                    <a href="#" onclick="window.navigate('kelas')" class="sidebar-item flex items-center px-4 py-2 text-xs font-semibold text-gray-700" data-target="kelas"><i class="fas fa-chalkboard w-5 text-center mr-2 text-green-500"></i> Data Kelas</a>
                    <div class="px-4 py-1 text-[10px] font-bold text-gray-400 uppercase">Layanan</div>
                    <a href="#" onclick="window.navigate('kunjungan')" class="sidebar-item flex items-center px-4 py-2 text-xs font-semibold text-gray-700" data-target="kunjungan"><i class="fas fa-walking w-5 text-center mr-2 text-green-500"></i> Buku Kunjungan</a>
                    <div class="px-4 py-1 text-[10px] font-bold text-gray-400 uppercase">Laporan</div>
                    <a href="#" onclick="window.navigate('laporan')" class="sidebar-item flex items-center px-4 py-2 text-xs font-semibold text-gray-700" data-target="laporan"><i class="fas fa-file-alt w-5 text-center mr-2 text-green-500"></i> Laporan</a>
                    <a href="#" onclick="window.navigate('pengaturan')" class="sidebar-item flex items-center px-4 py-2 text-xs font-semibold text-gray-700" data-target="pengaturan"><i class="fas fa-cog w-5 text-center mr-2 text-green-500"></i> Pengaturan</a>
                </nav>
            </div>
            <div class="p-4 border-t border-gray-200">
                <button onclick="window.handleLogout()" class="w-full flex items-center justify-center py-2 text-xs font-bold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
                    <i class="fas fa-sign-out-alt mr-2"></i> Keluar
                </button>
            </div>
        </aside>

        <!-- AREA CONTENT UTAMA -->
        <main class="flex-1 flex flex-col h-full overflow-hidden bg-gray-50">
            <header class="bg-white shadow-sm border-b border-gray-200 flex items-center justify-between p-4 flex-shrink-0">
                <div class="flex items-center">
                    <button class="md:hidden text-gray-600 mr-4" onclick="window.toggleSidebar()"><i class="fas fa-bars text-xl"></i></button>
                    <div class="flex items-center space-x-2">
                        <h1 class="text-base md:text-lg font-semibold text-gray-800" id="page-title">Dashboard</h1>
                        <span id="sync-indicator" class="hidden inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-800 animate-pulse">
                            <i class="fas fa-sync-alt fa-spin mr-1"></i> Sinkronisasi...
                        </span>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-xs text-gray-500 hidden sm:block" id="current-datetime"></div>
                    <div class="h-8 w-8 rounded-full bg-green-100 flex items-center justify-center text-green-700 font-bold border border-green-200 shadow-sm text-sm">A</div>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-4" id="content-area"></div>
        </main>
    </div>

    <!-- AREA UNTUK PROSES PRINT KERTAS -->
    <div id="print-area" class="hidden bg-white p-8"></div>

    <!-- LOGIKA SISTEM UTAMA JAVASCRIPT -->
    <script>
        // --- State Management ---
        const AppState = {
            isLoggedIn: false,
            settings: { libraryName: "Perpustakaan", schoolName: "Sekolah", finePerDay: 1000, maxBorrowDays: 7 },
            books: [], members: [], classes: [], transactions: [], visits: [],
            initMockData() {
                this.classes = ["X MIPA 1", "X MIPA 2", "XI IPS 1", "XII BAHASA"];
                this.members = [
                    { id: "M001", nis: "1001", name: "Budi Santoso", class: "X MIPA 1", phone: "08123456789", photoData: "" },
                    { id: "M002", nis: "1002", name: "Siti Aminah", class: "XI IPS 1", phone: "08987654321", photoData: "" }
                ];
                this.books = [
                    { id: "B001", isbn: "9786020300001", title: "Matematika Diskrit", author: "Rinaldi Munir", publisher: "Informatika", year: 2020, category: "Sains", stock: 5, coverUrl: "https://placehold.co/150x200/16a34a/ffffff?text=Sains", printed: false, inputDate: "2026-05-10" },
                    { id: "B002", isbn: "9786020300002", title: "Sejarah Indonesia", author: "Ahmad Haryono", publisher: "Balai Pustaka", year: 2019, category: "Sejarah", stock: 3, coverUrl: "https://placehold.co/150x200/10b981/ffffff?text=Sejarah", printed: true, inputDate: "2026-05-12" }
                ];
                this.visits = [
                     { id: "V001", memberId: "M001", date: new Date().toISOString().split('T')[0], time: "08:15" },
                     { id: "V002", memberId: "M002", date: new Date().toISOString().split('T')[0], time: "09:30" }
                ];
                this.transactions = [
                    { id: "TRX01", memberId: "M001", bookId: "B001", borrowDate: "2026-05-01", dueDate: "2026-05-08", returnDate: "2026-05-07", fine: 0 },
                    { id: "TRX02", memberId: "M002", bookId: "B002", borrowDate: "2026-05-10", dueDate: "2026-05-17", returnDate: null, fine: 0 }
                ];
            }
        };

        const Utils = {
            generateId: (prefix) => prefix + Math.random().toString(36).substr(2, 5).toUpperCase(),
            formatDate: (dateString) => dateString ? new Date(dateString).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' }) : '-',
            formatCurrency: (amount) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(amount),
            calculateFine: (dueDate) => {
                const due = new Date(dueDate); due.setHours(0,0,0,0);
                const now = new Date(); now.setHours(0,0,0,0);
                if (now > due) return Math.ceil(Math.abs(now - due) / (1000 * 60 * 60 * 24)) * AppState.settings.finePerDay;
                return 0;
            },
            sanitizeArray: (arr) => Array.isArray(arr) ? arr.filter(item => item !== null && item !== undefined && typeof item === 'object') : []
        };

        window.AppState = AppState; window.Utils = Utils; window.opacResultsCache = [];

        window.saveLocalCache = () => {
            localStorage.setItem('perpustakaan_premium_cache', JSON.stringify({
                settings: AppState.settings, books: AppState.books, members: AppState.members,
                classes: AppState.classes, transactions: AppState.transactions, visits: AppState.visits
            }));
        };

        // --- Helper Leaderboard ---
        window.getTopMembers = () => {
            const counts = {};
            Utils.sanitizeArray(AppState.visits).forEach(v => { if (v && v.memberId) counts[v.memberId] = (counts[v.memberId] || 0) + 1; });
            const validMembers = Utils.sanitizeArray(AppState.members);
            const sorted = Object.keys(counts).map(id => ({ id, count: counts[id], member: validMembers.find(m => m && m.id === id) }))
               .filter(item => item.member).sort((a, b) => b.count - a.count).slice(0, 5);
            if (sorted.length === 0) return `<p class="text-gray-500 text-xs py-2 text-center">Belum ada log kunjungan.</p>`;
            return sorted.map((item, idx) => `
                <div class="flex items-center justify-between p-2 hover:bg-green-50 rounded-lg text-xs border-b">
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-green-600">${idx + 1}</span>
                        <div>
                            <h4 class="font-bold text-gray-800">${item.member.name}</h4>
                            <p class="text-[10px] text-gray-500">${item.member.class}</p>
                        </div>
                    </div>
                    <span class="bg-green-100 text-green-800 text-[10px] font-bold px-2 py-0.5 rounded-full"><i class="fas fa-door-open mr-1"></i>${item.count} Kunjungan</span>
                </div>
            `).join('');
        };

        window.getTopBooks = () => {
            const counts = {};
            Utils.sanitizeArray(AppState.transactions).forEach(t => { if (t && t.bookId) counts[t.bookId] = (counts[t.bookId] || 0) + 1; });
            const validBooks = Utils.sanitizeArray(AppState.books);
            const sorted = Object.keys(counts).map(id => ({ id, count: counts[id], book: validBooks.find(b => b && b.id === id) }))
               .filter(item => item.book).sort((a, b) => b.count - a.count).slice(0, 5);
            if (sorted.length === 0) return `<p class="text-gray-500 text-xs py-2 text-center">Belum ada transaksi peminjaman.</p>`;
            return sorted.map((item, idx) => `
                <div class="flex items-center justify-between p-2 hover:bg-blue-50 rounded-lg text-xs border-b">
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-blue-600">${idx + 1}</span>
                        <div>
                            <h4 class="font-bold text-gray-800 truncate max-w-[150px]">${item.book.title}</h4>
                            <p class="text-[10px] text-gray-500">Oleh: ${item.book.author}</p>
                        </div>
                    </div>
                    <span class="bg-blue-100 text-blue-800 text-[10px] font-bold px-2 py-0.5 rounded-full"><i class="fas fa-book-open mr-1"></i>${item.count} Kali</span>
                </div>
            `).join('');
        };
    </script>

    <script>
        // --- Antarmuka (Templates) ---
        const Views = {
            dashboard: () => `
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                    <div class="bg-white rounded-lg shadow-sm p-4 border border-l-4 border-l-green-500">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Total Buku</p>
                        <h3 class="text-xl font-bold text-gray-800 mt-1">${Utils.sanitizeArray(AppState.books).length}</h3>
                    </div>
                    <div class="bg-white rounded-lg shadow-sm p-4 border border-l-4 border-l-blue-500">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Anggota Aktif</p>
                        <h3 class="text-xl font-bold text-gray-800 mt-1">${Utils.sanitizeArray(AppState.members).length}</h3>
                    </div>
                    <div class="bg-white rounded-lg shadow-sm p-4 border border-l-4 border-l-amber-500">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Dipinjam</p>
                        <h3 class="text-xl font-bold text-gray-800 mt-1">${Utils.sanitizeArray(AppState.transactions).filter(t => t && !t.returnDate).length}</h3>
                    </div>
                    <div class="bg-white rounded-lg shadow-sm p-4 border border-l-4 border-l-purple-500">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Pengunjung Hari Ini</p>
                        <h3 class="text-xl font-bold text-gray-800 mt-1">${Utils.sanitizeArray(AppState.visits).filter(v => v && v.date === new Date().toISOString().split('T')[0]).length}</h3>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div class="bg-white rounded-lg shadow-sm p-4 border">
                        <h3 class="font-bold text-gray-800 text-sm mb-3 pb-2 border-b"><i class="fas fa-crown text-amber-500 mr-1"></i>Anggota Teraktif</h3>
                        <div class="space-y-1">${window.getTopMembers()}</div>
                    </div>
                    <div class="bg-white rounded-lg shadow-sm p-4 border">
                        <h3 class="font-bold text-gray-800 text-sm mb-3 pb-2 border-b"><i class="fas fa-fire text-red-500 mr-1"></i>Buku Terpopuler</h3>
                        <div class="space-y-1">${window.getTopBooks()}</div>
                    </div>
                </div>
            `,

            opac: () => `
                <div class="bg-white rounded-lg shadow-sm border p-4">
                    <div class="text-center mb-6 bg-gradient-to-r from-green-500 to-teal-600 p-4 rounded-lg text-white">
                        <h2 class="text-base md:text-lg font-bold"><i class="fas fa-search-plus mr-1"></i>OPAC Digital Mandiri</h2>
                        <input type="text" id="opac-public-search" placeholder="Cari judul, penulis atau ISBN..." class="w-full max-w-md mx-auto mt-3 px-4 py-1.5 text-gray-800 rounded-full text-xs focus:outline-none" onkeyup="window.renderOpacGrid()">
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4" id="opac-grid-body"></div>
                </div>
            `,

            peminjaman: () => `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="bg-white rounded-lg border p-4 h-fit">
                        <h3 class="font-bold text-gray-800 text-sm mb-3 border-b pb-2">Form Peminjaman</h3>
                        <form id="borrow-form" onsubmit="window.processBorrow(event)">
                            <div class="mb-3">
                                <label class="block text-xs font-bold text-gray-600 mb-1">ID Anggota / NIS</label>
                                <input type="text" id="borrow-member-id" class="w-full p-2 border rounded text-xs focus:outline-none focus:border-green-500" required onchange="window.lookupMember('borrow')">
                                <div id="borrow-member-info" class="mt-1 text-xs text-green-600 font-bold min-h-[16px]"></div>
                            </div>
                            <div class="mb-3">
                                <label class="block text-xs font-bold text-gray-600 mb-1">ID Buku / Barcode</label>
                                <input type="text" id="borrow-book-id" class="w-full p-2 border rounded text-xs focus:outline-none focus:border-green-500" required onchange="window.lookupBook('borrow')">
                                <div id="borrow-book-info" class="mt-1 text-xs text-green-600 font-bold min-h-[16px]"></div>
                            </div>
                            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded text-xs">Simpan Transaksi</button>
                        </form>
                    </div>
                    <div class="bg-white rounded-lg border p-4 lg:col-span-2">
                        <h3 class="font-bold text-gray-800 text-sm mb-3 border-b pb-2">Buku Sedang Dipinjam</h3>
                        <div class="overflow-x-auto"><table class="w-full text-xs text-left"><tbody id="active-borrow-table"></tbody></table></div>
                    </div>
                </div>
            `,

            pengembalian: () => `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="bg-white rounded-lg border p-4 h-fit">
                        <h3 class="font-bold text-gray-800 text-sm mb-3 border-b pb-2">Form Pengembalian</h3>
                        <form id="return-form" onsubmit="window.processReturn(event)">
                            <div class="mb-3">
                                <label class="block text-xs font-bold text-gray-600 mb-1">ID Buku / Barcode</label>
                                <input type="text" id="return-book-id" class="w-full p-2 border rounded text-xs focus:outline-none focus:border-green-500 font-mono" required onchange="window.lookupReturnInfo()">
                            </div>
                            <div id="return-info-panel" class="hidden mb-3 p-3 bg-gray-50 rounded border text-xs">
                                <p class="text-gray-500">Peminjam:</p><p id="ret-member-name" class="font-bold text-gray-800 mb-2">-</p>
                                <div class="flex justify-between">
                                    <span id="ret-days-late" class="font-bold">0 Hari</span><span id="ret-fine-amount" class="font-bold text-red-600">Rp 0</span>
                                </div>
                            </div>
                            <button type="submit" id="btn-process-return" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded text-xs disabled:opacity-50" disabled>Proses Kembali</button>
                        </form>
                    </div>
                    <div class="bg-white rounded-lg border p-4 lg:col-span-2">
                        <h3 class="font-bold text-gray-800 text-sm mb-3 border-b pb-2">Log Pengembalian</h3>
                        <div class="overflow-x-auto"><table class="w-full text-xs text-left"><tbody id="recent-return-table"></tbody></table></div>
                    </div>
                </div>
            `,

            kunjungan: () => `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="bg-white rounded-lg border p-4 h-fit">
                        <h3 class="font-bold text-gray-800 text-sm mb-3 border-b pb-2">Buku Tamu Mandiri</h3>

    <script>
        // --- Watchdog, Inisialisasi, & Sinkronisasi ---
        window.showLoading = (text) => {
            const overlay = document.getElementById('loading-overlay');
            const textEl = document.getElementById('loading-text');
            if (overlay) overlay.classList.remove('hidden');
            if (textEl) textEl.innerText = text;
        };

        window.hideLoading = () => {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.classList.add('hidden');
        };

        window.updateBrandLabels = () => {
            const lib = AppState.settings.libraryName;
            const sch = AppState.settings.schoolName;
            ['login-lib-name', 'sidebar-lib-name'].forEach(id => { const el = document.getElementById(id); if (el) el.innerText = lib; });
            ['login-school-name', 'sidebar-school-name'].forEach(id => { const el = document.getElementById(id); if (el) el.innerText = sch; });
        };

        window.bypassLoading = () => {
            window.hideLoading();
            if (AppState.books.length === 0) { AppState.initMockData(); window.updateBrandLabels(); }
            Swal.fire("Mode Offline", "Koneksi lambat. Menggunakan basis data cache lokal.", "warning");
        };

        window.showSyncIndicator = (show) => {
            const ind = document.getElementById('sync-indicator');
            if (ind) ind.classList.toggle('hidden', !show);
        };

        window.onload = function() {
            let watchdog = setTimeout(() => {
                const btn = document.getElementById('bypass-loading-btn');
                if (btn) btn.classList.remove('hidden');
            }, 4000);

            const cached = localStorage.getItem('perpustakaan_premium_cache');
            let hasCache = false;
            if (cached) {
                try {
                    const parsed = JSON.parse(cached);
                    AppState.settings = parsed.settings || AppState.settings;
                    AppState.books = Utils.sanitizeArray(parsed.books);
                    AppState.members = Utils.sanitizeArray(parsed.members);
                    AppState.classes = (parsed.classes || []).filter(Boolean);
                    AppState.transactions = Utils.sanitizeArray(parsed.transactions);
                    AppState.visits = Utils.sanitizeArray(parsed.visits);
                    window.updateBrandLabels();
                    hasCache = true;
                } catch (e) {}
            }

            if (hasCache) {
                clearTimeout(watchdog); window.hideLoading(); window.showSyncIndicator(true);
            } else {
                window.showLoading("Mengunduh basis data...");
            }

            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler(function(res) {
                        clearTimeout(watchdog);
                        AppState.settings = res.settings;
                        AppState.books = Utils.sanitizeArray(res.books);
                        AppState.members = Utils.sanitizeArray(res.members);
                        AppState.classes = (res.classes || []).filter(Boolean);
                        AppState.transactions = Utils.sanitizeArray(res.transactions);
                        AppState.visits = Utils.sanitizeArray(res.visits);
                        window.saveLocalCache();
                        window.updateBrandLabels();
                        window.showSyncIndicator(false);
                        window.hideLoading();
                        if (AppState.isLoggedIn) window.navigate('dashboard');
                    })
                    .withFailureHandler(function() {
                        clearTimeout(watchdog); window.showSyncIndicator(false); window.hideLoading();
                        if (!hasCache) { AppState.initMockData(); window.updateBrandLabels(); }
                    })
                    .getLibraryData();
            } else {
                clearTimeout(watchdog);
                if (!hasCache) AppState.initMockData();
                setTimeout(() => { window.hideLoading(); window.showSyncIndicator(false); }, 800);
            }
        };

        window.saveSettings = (e) => {
            e.preventDefault();
            const data = {
                libraryName: document.getElementById('set-lib-name').value,
                schoolName: document.getElementById('set-school-name').value,
                maxBorrowDays: parseInt(document.getElementById('set-max-days').value),
                finePerDay: parseInt(document.getElementById('set-fine').value)
            };
            window.showLoading("Menyimpan...");
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler(function() {
                        AppState.settings = data; window.saveLocalCache(); window.updateBrandLabels(); window.hideLoading();
                        Swal.fire("Berhasil", "Pengaturan disimpan.", "success");
                    }).saveSettings(data);
            } else {
                AppState.settings = data; window.saveLocalCache(); window.updateBrandLabels(); window.hideLoading();
                Swal.fire("Tersimpan Lokal", "Berhasil diperbarui di memori lokal.", "success");
            }
        };
    </script>

    <script>
        // --- Katalog Buku & Integrasi OPAC ---
        window.previewCover = () => {
            const val = document.getElementById('book-cover-url')?.value.trim();
            const el = document.getElementById('book-cover-preview');
            if (el) el.src = val || 'https://placehold.co/50x70';
        };

        window.renderBookTable = () => {
            const tbody = document.getElementById('book-table-body'); if (!tbody) return;
            const q = document.getElementById('search-book')?.value.toLowerCase() || '';
            tbody.innerHTML = '';
            const filtered = Utils.sanitizeArray(AppState.books).filter(b => b.title.toLowerCase().includes(q) || b.id.toLowerCase().includes(q));
            
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-gray-500">Koleksi kosong.</td></tr>`; return;
            }

            filtered.forEach(b => {
                const tr = document.createElement('tr'); tr.className = "border-b text-xs hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="p-2 w-8"><input type="checkbox" class="book-checkbox" value="${b.id}"></td>
                    <td class="p-2 w-10"><img src="${b.coverUrl || 'https://placehold.co/50x70'}" class="w-8 h-11 object-cover rounded border"></td>
                    <td class="p-2 font-bold text-green-700">${b.id}</td>
                    <td class="p-2 font-semibold text-gray-800">${b.title}<br><span class="text-[10px] text-gray-400">Oleh: ${b.author}</span></td>
                    <td class="p-2">${b.isbn || '-'}</td>
                    <td class="p-2">${b.stock} eks</td>
                    <td class="p-2 text-right">
                        <button onclick="window.printBookLabel('${b.id}')" class="text-blue-600 mr-2"><i class="fas fa-barcode"></i></button>
                        <button onclick="window.editBook('${b.id}')" class="text-green-600 mr-2"><i class="fas fa-edit"></i></button>
                        <button onclick="window.deleteBook('${b.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        };

        window.toggleSelectAllBooks = (master) => {
            document.querySelectorAll('.book-checkbox').forEach(cb => cb.checked = master.checked);
        };

        window.selectUnprintedBooks = () => {
            document.querySelectorAll('.book-checkbox').forEach(cb => {
                const b = Utils.sanitizeArray(AppState.books).find(item => item.id === cb.value);
                cb.checked = (b && !b.printed);
            });
        };

        window.openBookModal = (book = null) => {
            document.getElementById('book-modal').classList.remove('hidden');
            document.getElementById('book-form').reset();
            if (book) {
                document.getElementById('book-modal-title').innerText = 'Edit Buku';
                document.getElementById('book-id').value = book.id;
                document.getElementById('book-title').value = book.title;
                document.getElementById('book-cover-url').value = book.coverUrl || '';
                document.getElementById('book-isbn').value = book.isbn || '';
                document.getElementById('book-category').value = book.category || '';
                document.getElementById('book-author').value = book.author;
                document.getElementById('book-publisher').value = book.publisher || '';
                document.getElementById('book-year').value = book.year || '';
                document.getElementById('book-stock').value = book.stock;
            } else {
                document.getElementById('book-modal-title').innerText = 'Tambah Buku';
                document.getElementById('book-id').value = '';
            }
            window.previewCover();
        };

        window.closeBookModal = () => document.getElementById('book-modal').classList.add('hidden');

        window.saveBook = (e) => {
            e.preventDefault();
            const id = document.getElementById('book-id').value;
            const exist = Utils.sanitizeArray(AppState.books).find(b => b.id === id);
            const today = new Date().toISOString().split('T')[0];
            const data = {
                id: id || Utils.generateId('B'),
                title: document.getElementById('book-title').value,
                coverUrl: document.getElementById('book-cover-url').value.trim(),
                isbn: document.getElementById('book-isbn').value,
                category: document.getElementById('book-category').value,
                author: document.getElementById('book-author').value,
                publisher: document.getElementById('book-publisher').value,
                year: parseInt(document.getElementById('book-year').value) || 0,
                stock: parseInt(document.getElementById('book-stock').value),
                printed: exist ? (exist.printed || false) : false,
                inputDate: exist ? (exist.inputDate || today) : today
            };
            window.showLoading("Menyimpan...");
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler(function() {
                        if (id) {
                            const idx = AppState.books.findIndex(b => b.id === id); if (idx > -1) AppState.books[idx] = data;
                        } else { AppState.books.push(data); }
                        AppState.books = Utils.sanitizeArray(AppState.books);
                        window.saveLocalCache(); window.closeBookModal(); window.renderBookTable(); window.hideLoading();
                        Swal.fire("Berhasil", "Katalog disinkronkan.", "success");
                    }).saveOrUpdateRow('Books', 'id', data);
            } else {
                if (id) {
                    const idx = AppState.books.findIndex(b => b.id === id); if (idx > -1) AppState.books[idx] = data;
                } else { AppState.books.push(data); }
                AppState.books = Utils.sanitizeArray(AppState.books);
                window.saveLocalCache(); window.closeBookModal(); window.renderBookTable(); window.hideLoading();
                Swal.fire("Tersimpan Lokal", "Buku disimpan.", "success");
            }
        };

        window.editBook = (id) => {
            const b = Utils.sanitizeArray(AppState.books).find(item => item.id === id);
            if (b) window.openBookModal(b);
        };

        window.deleteBook = (id) => {
            Swal.fire({ title: 'Hapus Buku?', text: "Data tidak bisa dikembalikan!", icon: 'warning', showCancelButton: true }).then((r) => {
                if (r.isConfirmed) {
                    window.showLoading("Menghapus...");
                    if (typeof google !== 'undefined' && google.script && google.script.run) {
                        google.script.run
                            .withSuccessHandler(function() {
                                AppState.books = Utils.sanitizeArray(AppState.books).filter(b => b.id !== id);
                                window.saveLocalCache(); window.renderBookTable(); window.hideLoading();
                                Swal.fire('Terhapus!', 'Buku telah dihapus.', 'success');
                            }).deleteRow('Books', id);
                    } else {
                        AppState.books = Utils.sanitizeArray(AppState.books).filter(b => b.id !== id);
                        window.saveLocalCache(); window.renderBookTable(); window.hideLoading();
                        Swal.fire('Terhapus!', 'Data dihapus lokal.', 'success');
                    }
                }
            });
        };

        window.openOpacModal = () => {
            document.getElementById('opac-modal').classList.remove('hidden');
            document.getElementById('opac-search-input').value = '';
            document.getElementById('opac-results').innerHTML = `<p class="text-center text-xs text-gray-500 py-10">Masukkan kueri penelusuran.</p>`;
        };
        window.closeOpacModal = () => document.getElementById('opac-modal').classList.add('hidden');

        window.searchOpac = async () => {
            const q = document.getElementById('opac-search-input').value.trim(); if (!q) return;
            const resEl = document.getElementById('opac-results');
            resEl.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-xl text-green-500"></i></div>';
            window.opacResultsCache = [];
            try {
                const response = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=5`);
                const data = await response.json();
                if (data.docs && data.docs.length > 0) {
                    window.opacResultsCache = data.docs.map(doc => ({
                        title: doc.title,
                        author: doc.author_name ? doc.author_name.join(', ') : 'Tanpa Nama',
                        publisher: doc.publisher ? doc.publisher[0] : 'Karya Umum',
                        year: doc.first_publish_year || 2024,
                        isbn: doc.isbn ? doc.isbn[0] : '',
                        coverUrl: doc.cover_i ? `https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg` : ''
                    }));
                    resEl.innerHTML = window.opacResultsCache.map((item, idx) => `
                        <div class="p-2 border rounded flex items-center justify-between text-xs bg-white shadow-sm">
                            <div>
                                <h4 class="font-bold">${item.title}</h4>
                                <p class="text-[10px] text-gray-500">${item.author} (${item.year})</p>
                            </div>
                            <button onclick="window.importFromCacheByIndex(${idx})" class="bg-green-100 text-green-800 px-2 py-1 rounded font-bold text-[10px]">Impor</button>
                        </div>
                    `).join('');
                } else {
                    resEl.innerHTML = `<p class="text-center text-xs text-red-500 py-10">Metadata tidak ditemukan.</p>`;
                }
            } catch (err) {
                resEl.innerHTML = `<p class="text-center text-xs text-gray-500 py-10">Katalog offline / Batasan API.</p>`;
            }
        };

        window.importFromCacheByIndex = (idx) => {
            const d = window.opacResultsCache[idx]; if (!d) return;
            window.closeOpacModal();
            window.openBookModal({ id: '', title: d.title, coverUrl: d.coverUrl, author: d.author, publisher: d.publisher, year: d.year, isbn: d.isbn, category: '', stock: 1 });
        };
    </script>

            const { value: val } = await Swal.fire({ title: 'Tambah Kelas', input: 'text', inputPlaceholder: 'Contoh: X MIPA 1', showCancelButton: true });
            if (val) {
                const className = val.trim();
                if (!className) return;
                if (AppState.classes.includes(className)) return Swal.fire("Info", "Kelas sudah ada.", "warning");
                
                window.showLoading("Menyimpan...");
                AppState.classes.push(className);
                
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(function() {
                            window.saveLocalCache(); window.renderKelas(); window.hideLoading();

                        })
                        .withFailureHandler(function(err){
                            window.hideLoading();
                            Swal.fire("Gagal", err, "error");
                        })
                        .saveClasses(AppState.classes);
                } else {
                    window.saveLocalCache(); window.renderKelas(); window.hideLoading();
                    Swal.fire({ icon: 'success', title: 'Tersimpan Lokal', showConfirmButton: false, timer: 1000 });

                if (r.isConfirmed) {

                            .withSuccessHandler(function() {
